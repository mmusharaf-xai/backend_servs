services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: eol
      POSTGRES_USER: eol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eoldev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eol"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  gateway:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "8080"
      ENV: production
      DATABASE_URL: postgres://eol:${POSTGRES_PASSWORD:-eoldev}@postgres:5432/eol?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-64-char-string}
      JWT_ACCESS_TTL: "24h"
      REFRESH_TOKEN_TTL: "168h"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:8080/api/auth/google/callback}
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"

volumes:
  pgdata:
  redisdata:
