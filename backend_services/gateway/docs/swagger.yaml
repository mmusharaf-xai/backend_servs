host: localhost:8080
info:
  contact: {}
  description: API gateway for Eternal Orbit Labs — authentication, organizations,
    teams, and app management.
  title: EOL Gateway API
  version: "1.0"
paths:
  /api/apps:
    get:
      description: Returns a paginated list of apps. Supports cursor-based pagination
        and search.
      parameters:
      - description: Search query
        in: query
        name: q
        type: string
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - default: 20
        description: Results per page (max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.AppListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAPIKey: []
      summary: List apps
      tags:
      - Apps
  /api/apps/{slug}:
    get:
      description: Returns a single app by its URL slug.
      parameters:
      - description: App slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.AppGetResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAPIKey: []
      summary: Get app by slug
      tags:
      - Apps
  /api/apps/{slug}/invites/{inviteId}/accept:
    post:
      description: Accept a pending organization invite. The user must be the invite
        recipient.
      parameters:
      - description: App slug
        in: path
        name: slug
        required: true
        type: string
      - description: Invite ID
        in: path
        name: inviteId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.OrgResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAPIKey: []
      summary: Accept invite
      tags:
      - Invites
  /api/apps/{slug}/orgs:
    get:
      description: Returns the authenticated user's organizations and pending invites
        for the given app.
      parameters:
      - description: App slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.OrgListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAPIKey: []
      summary: List user's organizations
      tags:
      - Organizations
    post:
      consumes:
      - application/json
      description: Create a new organization under the given app. The authenticated
        user becomes the owner.
      parameters:
      - description: App slug
        in: path
        name: slug
        required: true
        type: string
      - description: Organization details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateOrgRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler.OrgResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAPIKey: []
      summary: Create organization
      tags:
      - Organizations
  /api/apps/{slug}/orgs/{orgId}:
    get:
      description: Returns organization details. Requires the user to be a member.
      parameters:
      - description: App slug
        in: path
        name: slug
        required: true
        type: string
      - description: Organization ID
        in: path
        name: orgId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.OrgResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAPIKey: []
      summary: Get organization
      tags:
      - Organizations
  /api/apps/{slug}/orgs/{orgId}/invites:
    post:
      consumes:
      - application/json
      description: Send an invitation to join the organization.
      parameters:
      - description: App slug
        in: path
        name: slug
        required: true
        type: string
      - description: Organization ID
        in: path
        name: orgId
        required: true
        type: string
      - description: Invite details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateInviteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler.InviteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAPIKey: []
      summary: Create invite
      tags:
      - Invites
  /api/apps/{slug}/orgs/{orgId}/invites/{inviteId}:
    delete:
      description: Permanently delete a pending invitation.
      parameters:
      - description: App slug
        in: path
        name: slug
        required: true
        type: string
      - description: Organization ID
        in: path
        name: orgId
        required: true
        type: string
      - description: Invite ID
        in: path
        name: inviteId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAPIKey: []
      summary: Delete invite
      tags:
      - Invites
    patch:
      consumes:
      - application/json
      description: Update a pending invite's details (email, name, phone, status).
      parameters:
      - description: App slug
        in: path
        name: slug
        required: true
        type: string
      - description: Organization ID
        in: path
        name: orgId
        required: true
        type: string
      - description: Invite ID
        in: path
        name: inviteId
        required: true
        type: string
      - description: Updated invite details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.UpdateInviteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.InviteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAPIKey: []
      summary: Update invite
      tags:
      - Invites
  /api/apps/{slug}/orgs/{orgId}/members:
    get:
      description: Returns a paginated list of organization members with optional
        filters.
      parameters:
      - description: App slug
        in: path
        name: slug
        required: true
        type: string
      - description: Organization ID
        in: path
        name: orgId
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Results per page (max 100)
        in: query
        name: limit
        type: integer
      - description: Search across name, email, phone
        in: query
        name: q
        type: string
      - description: Filter by first name
        in: query
        name: first_name
        type: string
      - description: Filter by last name
        in: query
        name: last_name
        type: string
      - description: Filter by email
        in: query
        name: email
        type: string
      - description: Filter by phone
        in: query
        name: phone
        type: string
      - description: Filter by status (active, deactive)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.MemberListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAPIKey: []
      summary: List org members
      tags:
      - Members
    post:
      consumes:
      - application/json
      description: Add an existing user to the organization by email.
      parameters:
      - description: App slug
        in: path
        name: slug
        required: true
        type: string
      - description: Organization ID
        in: path
        name: orgId
        required: true
        type: string
      - description: Member details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateMemberRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - CookieAuth: []
      - BearerAPIKey: []
      summary: Add member
      tags:
      - Members
  /api/apps/{slug}/orgs/{orgId}/members/{memberId}:
    delete:
      description: Remove a member from the organization. Cannot remove the owner.
